<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMeter学习演示页面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 30px; font-size: 2.5em; }
        .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h2 { color: #333; margin-bottom: 15px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        button.primary { background: #667eea; color: white; }
        button.success { background: #48bb78; color: white; }
        button.warning { background: #ed8936; color: white; }
        button.danger { background: #f56565; color: white; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .result { background: #f7fafc; padding: 15px; border-radius: 5px; font-family: monospace; font-size: 13px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: 500; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .form-row { display: flex; gap: 10px; }
        .form-row > div { flex: 1; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 JMeter性能测试学习演示</h1>
        
        <div class="card">
            <h2>📊 用户管理接口测试</h2>
            <div class="btn-group">
                <button class="primary" onclick="getUsers()">获取用户列表</button>
                <button class="success" onclick="getUser(1)">获取用户#1</button>
                <button class="warning" onclick="createUser()">创建用户</button>
                <button class="danger" onclick="deleteUser(6)">删除用户#6</button>
            </div>
            <div class="result" id="userResult">点击按钮测试API...</div>
        </div>

        <div class="card">
            <h2>🛍️ 产品管理接口测试</h2>
            <div class="form-group">
                <div class="form-row">
                    <div>
                        <label>筛选类别:</label>
                        <select id="productCategory">
                            <option value="">全部</option>
                            <option value="手机">手机</option>
                            <option value="电脑">电脑</option>
                            <option value="耳机">耳机</option>
                        </select>
                    </div>
                    <div>
                        <label>最低价格:</label>
                        <input type="number" id="minPrice" placeholder="0">
                    </div>
                    <div>
                        <label>最高价格:</label>
                        <input type="number" id="maxPrice" placeholder="99999">
                    </div>
                </div>
            </div>
            <div class="btn-group">
                <button class="primary" onclick="getProducts()">获取产品列表</button>
                <button class="success" onclick="getProduct(1)">获取产品#1</button>
            </div>
            <div class="result" id="productResult">点击按钮测试API...</div>
        </div>

        <div class="card">
            <h2>🔐 认证接口测试</h2>
            <div class="form-group">
                <div class="form-row">
                    <div>
                        <label>用户名:</label>
                        <input type="text" id="username" value="admin" placeholder="输入用户名">
                    </div>
                    <div>
                        <label>密码:</label>
                        <input type="password" id="password" value="admin123" placeholder="输入密码">
                    </div>
                </div>
            </div>
            <div class="btn-group">
                <button class="success" onclick="login()">登录</button>
                <button class="danger" onclick="logout()">退出登录</button>
            </div>
            <div class="result" id="authResult">点击按钮测试API...</div>
        </div>

        <div class="card">
            <h2>📦 订单管理接口测试</h2>
            <div class="btn-group">
                <button class="primary" onclick="getOrders()">获取所有订单</button>
                <button class="success" onclick="getOrdersByUser(1)">获取用户1的订单</button>
                <button class="warning" onclick="createOrder()">创建订单</button>
            </div>
            <div class="result" id="orderResult">点击按钮测试API...</div>
        </div>

        <div class="card">
            <h2>⏱️ 特殊接口测试 (JMeter重点)</h2>
            <div class="form-group">
                <label>延迟时间 (毫秒):</label>
                <input type="number" id="slowDelay" value="2000" style="width: 200px;">
            </div>
            <div class="btn-group">
                <button class="primary" onclick="testSlow()">慢接口测试</button>
                <button class="success" onclick="testRandomDelay()">随机延迟测试</button>
                <button class="warning" onclick="testUpload()">文件上传模拟</button>
                <button class="danger" onclick="testError()">错误响应测试</button>
                <button class="primary" onclick="testStream()">流式响应测试</button>
                <button class="success" onclick="testConcurrent()">并发测试</button>
            </div>
            <div class="result" id="specialResult">点击按钮测试API...</div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:8000';

        async function apiCall(url, options = {}) {
            const startTime = Date.now();
            try {
                const response = await fetch(url, {
                    ...options,
                    headers: { 'Content-Type': 'application/json', ...options.headers }
                });
                const data = await response.json();
                const duration = Date.now() - startTime;
                return { success: true, data, status: response.status, duration };
            } catch (error) {
                const duration = Date.now() - startTime;
                return { success: false, error: error.message, duration };
            }
        }

        function displayResult(elementId, result) {
            const output = result.success 
                ? `状态: ${result.status}\n耗时: ${result.duration}ms\n\n${JSON.stringify(result.data, null, 2)}`
                : `错误: ${result.error}\n耗时: ${result.duration}ms`;
            document.getElementById(elementId).textContent = output;
        }

        async function getUsers() {
            const result = await apiCall(`${BASE_URL}/api/users?page=1&limit=10`);
            displayResult('userResult', result);
        }

        async function getUser(id) {
            const result = await apiCall(`${BASE_URL}/api/users/${id}`);
            displayResult('userResult', result);
        }

        async function createUser() {
            const result = await apiCall(`${BASE_URL}/api/users`, {
                method: 'POST',
                body: JSON.stringify({ name: '测试用户', email: 'test@example.com', age: 25 })
            });
            displayResult('userResult', result);
        }

        async function deleteUser(id) {
            const result = await apiCall(`${BASE_URL}/api/users/${id}`, { method: 'DELETE' });
            displayResult('userResult', result);
        }

        async function getProducts() {
            const category = document.getElementById('productCategory').value;
            const minPrice = document.getElementById('minPrice').value;
            const maxPrice = document.getElementById('maxPrice').value;
            
            let url = `${BASE_URL}/api/products?`;
            if (category) url += `category=${category}&`;
            if (minPrice) url += `min_price=${minPrice}&`;
            if (maxPrice) url += `max_price=${maxPrice}`;
            
            const result = await apiCall(url);
            displayResult('productResult', result);
        }

        async function getProduct(id) {
            const result = await apiCall(`${BASE_URL}/api/products/${id}`);
            displayResult('productResult', result);
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const result = await apiCall(`${BASE_URL}/api/login`, {
                method: 'POST',
                body: JSON.stringify({ username, password })
            });
            displayResult('authResult', result);
        }

        async function logout() {
            document.getElementById('authResult').textContent = '已退出登录';
        }

        async function getOrders() {
            const result = await apiCall(`${BASE_URL}/api/orders`);
            displayResult('orderResult', result);
        }

        async function getOrdersByUser(userId) {
            const result = await apiCall(`${BASE_URL}/api/orders?user_id=${userId}`);
            displayResult('orderResult', result);
        }

        async function createOrder() {
            const result = await apiCall(`${BASE_URL}/api/orders`, {
                method: 'POST',
                body: JSON.stringify({
                    user_id: 1,
                    items: [{ id: 1, name: 'iPhone 15', price: 5999, quantity: 1 }],
                    total: 5999
                })
            });
            displayResult('orderResult', result);
        }

        async function testSlow() {
            const delay = document.getElementById('slowDelay').value;
            const result = await apiCall(`${BASE_URL}/api/slow?delay=${delay}`);
            displayResult('specialResult', result);
        }

        async function testRandomDelay() {
            const result = await apiCall(`${BASE_URL}/api/random-delay?min_delay=500&max_delay=3000`);
            displayResult('specialResult', result);
        }

        async function testUpload() {
            const result = await apiCall(`${BASE_URL}/api/upload`, {
                method: 'POST',
                body: JSON.stringify({ filename: 'test.jpg', size: 1024000 })
            });
            displayResult('specialResult', result);
        }

        async function testError() {
            const result = await apiCall(`${BASE_URL}/api/error?code=500`);
            displayResult('specialResult', result);
        }

        async function testStream() {
            const result = await apiCall(`${BASE_URL}/api/stream/20`);
            displayResult('specialResult', result);
        }

        async function testConcurrent() {
            const result = await apiCall(`${BASE_URL}/api/concurrent-test`);
            displayResult('specialResult', result);
        }
    </script>
</body>
</html>
